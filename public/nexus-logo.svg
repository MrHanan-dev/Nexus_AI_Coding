  <!-- Connecting lines -->
  <line x1="16" y1="16" x2="8" y2="8" stroke="#58A6FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="24" y2="8" stroke="#58A6FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="8" y2="24" stroke="#58A6FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#58A6FF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Additional connection points -->
  <circle cx="16" cy="6" r="1" fill="#58A6FF" opacity="0.6"/>
  <circle cx="26" cy="16" r="1" fill="#58A6FF" opacity="0.6"/>
